<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos | Sistema TCC</title>

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3407/3407024.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/alunos.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="main-layout">

    <nav class="sidebar">

        <h2>SISTEMA TCC</h2>

        <a href="/html/dashboard.html">
            <i class="fas fa-chart-line"></i>
            Início
        </a>

        <a href="/html/alunos.html" class="active">
            <i class="fas fa-user-graduate"></i>
            Alunos
        </a>


        <a href="/html/empresas.html">
            <i class="fas fa-building"></i>
            Empresas
        </a>

        <a href="/html/tcc.html">
            <i class="fas fa-file-alt"></i>
            Projetos TCC
        </a>

        <a href="index.html" class="logout">
            <i class="fas fa-sign-out-alt"></i>
            Sair
        </a>

    </nav>

    <main class="content">

        <div class="header-content">
            <h1>Gerenciar Alunos</h1>
            <p>Cadastro e administração de alunos</p>
        </div>

        <div class="card-form">

            <h3>Novo Aluno</h3>

            <form id="formAluno">

                <input
                    type="text"
                    id="nomeAluno"
                    placeholder="Nome completo"
                    required
                >

                <input
                    type="text"
                    id="matriculaAluno"
                    placeholder="Matrícula"
                    required
                >

                <input
                    type="email"
                    id="emailAluno"
                    placeholder="Email"
                    required
                >

                <select id="cursoAluno" required>
                    <option value="">Selecione o curso</option>
                </select>

                <select id="empresaAluno" required>
                    <option value="">Selecione a empresa</option>
                </select>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

        </div>

        <div class="table-container">

            <h3>Lista de Alunos</h3>

            <table>

                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Curso</th>
                        <th>Empresa</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaBody"></tbody>

            </table>

        </div>

    </main>

</div>
<script src="js/config.js"></script>
<script src="js/alunos.js"></script>

</body>
</html>
