<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Pesquisa</title>

    <link rel="stylesheet" href="../css/resultado.css">
    <link rel="icon" type="image/png" href="../download.svg">

    <script defer src="../js/resultado.js"></script>
</head>

<body>

<div class="resultado-layout">

    <div class="resultado-info">
        <h1>Portal Acadêmico</h1>
        <p>Sistema de Consulta de Trabalhos de Conclusão de Curso.</p>
    </div>

    <div class="resultado-conteudo">

        <header class="cabecalho">
            <h2>Resultado da Pesquisa</h2>
        </header>

        <div id="resultado">
            <div class="resultado-card">
                <h2>Digite um termo de pesquisa</h2>
                <p>Ex: nome do aluno ou matrícula</p>
            </div>
        </div>

    </div>

</div>

<noscript>
    <div class="resultado-card">
        <h2>JavaScript desativado</h2>
        <p>Ative o JavaScript para usar o sistema.</p>
    </div>
</noscript>

</body>
</html>
