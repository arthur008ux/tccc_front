<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Empresas | Sistema TCC</title>

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3407/3407024.png">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/empresas.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="main-layout">

    <nav class="sidebar">

        <h2>SISTEMA TCC</h2>

        <a href="/html/dashboard.html">
            <i class="fas fa-chart-line"></i> Início
        </a>

        <a href="/html/alunos.html">
            <i class="fas fa-user-graduate"></i> Alunos
        </a>

        <a href="/html/empresas.html" class="active">
            <i class="fas fa-building"></i> Empresas
        </a>

         <a href="/html/tcc.html">
            <i class="fas fa-file-alt"></i>
            Projetos TCC
        </a>

        <a href="index.html">
            <i class="fas fa-sign-out-alt"></i> Sair
        </a>

        

    </nav>

    <main class="content">

        <div class="header-content">
            <h1>Empresas Parceiras</h1>
            <p>Cadastro e gerenciamento de empresas</p>
        </div>

        <div class="card-form">

            <h3>Nova Empresa</h3>

            <form id="formEmpresa">

                <input
                    type="text"
                    id="nomeEmpresa"
                    placeholder="Nome da empresa"
                    required
                >

                <input
                    type="text"
                    id="enderecoEmpresa"
                    placeholder="Endereço"
                    required
                >

                <input
                    type="text"
                    id="telefoneEmpresa"
                    placeholder="Telefone"
                    required
                >

                <button type="submit">
                    Cadastrar Empresa
                </button>

            </form>

        </div>

        <div class="table-container">

            <h3>Empresas Cadastradas</h3>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Empresa</th>
                        <th>Endereço</th>
                        <th>Telefone</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaEmpresas"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="../js/empresas.js"></script>

</body>
</html>
